name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        uses: anothrNick/github-tag-action@1.73.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          RELEASE_BRANCHES: main

      - name: Extract version number
        id: version
        run: |
          TAG="${{ steps.bump.outputs.tag || steps.bump.outputs.new_tag }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

  build-mac:
    needs: version
    if: needs.version.outputs.version != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use prod icon
        run: cp src/renderer/assets/yana_prod.png resources/icon.png

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app
        run: npm run build

      - name: Package & publish (signed, no notarization)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --mac --publish always
        timeout-minutes: 20

      - name: Set up notarization key
        if: env.APPLE_API_KEY != ''
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          echo "::add-mask::${APPLE_API_KEY_ID}"
          mkdir -p ~/private_keys
          printenv APPLE_API_KEY > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Notarize
        continue-on-error: true
        if: env.APPLE_API_KEY_ID != ''
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "::add-mask::${APPLE_API_KEY_ID}"
          echo "::add-mask::${APPLE_API_ISSUER}"
          for f in dist/*.dmg dist/*.zip; do
            [ -f "$f" ] || continue
            echo "Notarizing $f..."
            xcrun notarytool submit "$f" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait --timeout 10m || echo "Notarization failed for $f (non-blocking)"
            xcrun stapler staple "$f" 2>/dev/null || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

  build-win:
    needs: version
    if: needs.version.outputs.version != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use prod icon
        run: copy src\renderer\assets\yana_prod.png resources\icon.png

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app
        run: npm run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: ignore
